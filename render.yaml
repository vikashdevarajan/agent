services:
  - type: web
    name: iam-invoke-console
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

  - type: web
    name: tool-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn tool_server:app --host 0.0.0.0 --port $PORT
